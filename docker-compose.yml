version: "3.9"

services:
  picoclaw-bridge:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: picoclaw-office-bridge
    # Bridge is internal - only reachable via nginx proxy or direct host port
    ports:
      - "7070:7070"   # direct access (for node mode / debugging)
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - OLLAMA_BASE=${OLLAMA_BASE:-http://host-gateway:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - NODE_ENV=production
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - picoclaw-workspace:/root/.picoclaw/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  picoclaw-ui:
    image: nginx:alpine
    container_name: picoclaw-office-ui
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      picoclaw-bridge:
        condition: service_healthy
    restart: unless-stopped

volumes:
  picoclaw-workspace:
