server {
    listen 80;

    # Serve static UI files
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket + HTTP to bridge on port 7070
    # So browser can use ws://localhost:8080/ws instead of ws://localhost:7070
    location /ws {
        proxy_pass http://picoclaw-bridge:7070;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Also proxy /health and /agents for convenience
    location ~ ^/(health|agents|models) {
        proxy_pass http://picoclaw-bridge:7070;
        proxy_set_header Host $host;
    }
}
